databaseChangeLog:
  - changeSet:
      id: 1
      author: sxpjb
      changes:
        - createTable:
            tableName: app_configuration
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: key
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: value
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: section
                  type: varchar(50)
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: app_configuration